basePath: /api
definitions:
  models.ChangePasswordInput:
    properties:
      new_password:
        type: string
      old_password:
        type: string
    required:
    - new_password
    - old_password
    type: object
  models.DanceCompareRequest:
    properties:
      dance_id:
        type: string
      segment_idx:
        type: integer
      video_key:
        type: string
    type: object
  models.DanceCompareResponse:
    properties:
      dance_id:
        type: string
      overall_score:
        type: number
      segment_idx:
        type: integer
      segments:
        items:
          $ref: '#/definitions/models.SegmentCompareDetail'
        type: array
      weakest_metrics:
        items:
          type: string
        type: array
    type: object
  models.DanceLike:
    properties:
      created_at:
        type: string
      dance_id:
        type: string
    type: object
  models.LikeResponse:
    properties:
      dance_id:
        type: string
      liked:
        type: boolean
      likes_count:
        type: integer
    type: object
  models.LoadDanceByURLInput:
    properties:
      url:
        type: string
    type: object
  models.LoadDanceResponse:
    properties:
      dance_id:
        type: string
      duration_sec:
        type: number
      full_glb_key:
        type: string
      glb_keys:
        items:
          type: string
        type: array
      is_liked:
        type: boolean
      likes_count:
        type: integer
      num_frames:
        type: integer
      num_segments:
        type: integer
      num_segments_rendered:
        type: integer
      segments_key:
        type: string
      video_path:
        type: string
    type: object
  models.MainPageResponse:
    properties:
      count:
        type: integer
      videos:
        items:
          $ref: '#/definitions/models.VideoItem'
        type: array
    type: object
  models.SearchHistoryItem:
    properties:
      created_at:
        type: string
      dance_id:
        type: string
      id:
        type: string
      name:
        type: string
      source_url:
        type: string
      user_id:
        type: string
    type: object
  models.SegmentCompareDetail:
    properties:
      dtw_scores:
        additionalProperties:
          format: float64
          type: number
        type: object
      joint_angles_diff:
        additionalProperties:
          format: float64
          type: number
        type: object
      rom_diff:
        type: number
      segment_idx:
        type: integer
      segment_score:
        type: number
      smoothness_diff:
        type: number
      symmetry_diff:
        type: number
      tempo_diff:
        type: number
      velocity_diff:
        type: number
    type: object
  models.SegmentDescriptionResponse:
    properties:
      dance_id:
        type: string
      description:
        type: string
      segment_idx:
        type: integer
    type: object
  models.SignInInput:
    properties:
      login:
        type: string
      password:
        type: string
      user_code:
        type: string
    required:
    - login
    - password
    type: object
  models.SignUpInput:
    properties:
      login:
        type: string
      password:
        type: string
    required:
    - login
    - password
    type: object
  models.UpdateHistoryNameInput:
    properties:
      name:
        type: string
    type: object
  models.User:
    properties:
      avatar:
        type: string
      created_at:
        type: string
      has_2fa:
        type: boolean
      id:
        type: string
      is_foreign:
        type: boolean
      login:
        type: string
      updated_at:
        type: string
      version:
        type: integer
    required:
    - avatar
    - has_2fa
    - id
    - is_foreign
    - login
    - version
    type: object
  models.UserLikeDancesResponse:
    properties:
      count:
        type: integer
      likes:
        items:
          $ref: '#/definitions/models.DanceLike'
        type: array
    type: object
  models.VKAuthRequest:
    properties:
      access_token:
        type: string
      login:
        type: string
    type: object
  models.VideoItem:
    properties:
      id:
        type: string
      url:
        type: string
    type: object
host: localhost:5458
info:
  contact: {}
  description: API для авторизации пользователей и получения разбора танца.
  title: DDDance API
  version: "1.0"
paths:
  /auth/check:
    get:
      description: Verify if user is authenticated and return user data
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.User'
        "401":
          description: Unauthorized
        "500":
          description: Internal Server Error
      summary: Check authentication status
      tags:
      - auth
  /auth/logout:
    post:
      description: Clear authentication cookie and log out user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
        "500":
          description: Internal Server Error
      summary: User logout
      tags:
      - auth
  /auth/signin:
    post:
      consumes:
      - application/json
      description: Authenticate user
      parameters:
      - description: User data
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/models.SignInInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.User'
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "500":
          description: Internal Server Error
      summary: User login
      tags:
      - auth
  /auth/signup:
    post:
      consumes:
      - application/json
      description: Register a new user account
      parameters:
      - description: User registration data
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/models.SignUpInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.User'
        "400":
          description: Bad Request
        "409":
          description: Conflict
        "500":
          description: Internal Server Error
      summary: User registration
      tags:
      - auth
  /auth/vk:
    post:
      consumes:
      - application/json
      description: Authenticate or register user via VK. If login is provided - registers
        new user, otherwise signs in existing user
      parameters:
      - description: VK auth data
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/models.VKAuthRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.User'
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "412":
          description: Precondition Failed
        "500":
          description: Internal Server Error
      summary: VK authentication
      tags:
      - auth
  /users/{id}:
    get:
      description: Возвращает публичные данные пользователя (ID, версию, логин, аватар)
      parameters:
      - description: UUID пользователя
        in: path
        name: id
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.User'
        "400":
          description: Неверный формат ID
          schema:
            type: string
        "401":
          description: Пользователь не авторизован
          schema:
            type: string
        "500":
          description: Внутренняя ошибка сервера
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      summary: Получить информацию о пользователе по ID
      tags:
      - users
  /users/change/password:
    put:
      consumes:
      - application/json
      description: Изменяет пароль, возвращает обновлённый JWT и CSRF-токен в куках
        и заголовке X-CSRF-Token
      parameters:
      - description: Старый и новый пароль
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.ChangePasswordInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.User'
        "400":
          description: Неверный запрос
          schema:
            type: string
        "401":
          description: Пользователь не авторизован
          schema:
            type: string
        "404":
          description: Пользователь не найден
          schema:
            type: string
        "500":
          description: Внутренняя ошибка сервера
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      summary: Изменить пароль текущего пользователя
      tags:
      - users
  /users/dance/{dance_id}/segment/{segment_idx}:
    get:
      description: Возвращает описание для указанного сегмента танца
      parameters:
      - description: ID танца
        in: path
        name: dance_id
        required: true
        type: string
      - description: Индекс сегмента (начиная с 0)
        in: path
        name: segment_idx
        required: true
        type: integer
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.SegmentDescriptionResponse'
        "400":
          description: Неверные параметры запроса
          schema:
            type: string
        "404":
          description: Танец или сегмент не найден
          schema:
            type: string
        "500":
          description: Внутренняя ошибка сервера
          schema:
            type: string
      security:
      - OptionalAuth: []
      summary: Получить текстовое описание сегмента танца
      tags:
      - dances
  /users/dance/{id}:
    get:
      description: Возвращает метаданные обработанного танца
      parameters:
      - description: ID танца
        in: path
        name: id
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.LoadDanceResponse'
        "400":
          description: Не указан ID танца
          schema:
            type: string
        "404":
          description: Танец не найден
          schema:
            type: string
        "500":
          description: Внутренняя ошибка сервера
          schema:
            type: string
      security:
      - OptionalAuth: []
      summary: Получить информацию о танце по ID
      tags:
      - dances
  /users/dance/{id}/like:
    post:
      description: Если лайк уже стоит — снимает его, если нет — ставит. Один пользователь
        может поставить только один лайк.
      parameters:
      - description: ID танца
        in: path
        name: id
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.LikeResponse'
        "400":
          description: Не указан ID танца
          schema:
            type: string
        "401":
          description: Пользователь не авторизован
          schema:
            type: string
        "500":
          description: Внутренняя ошибка сервера
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      summary: Поставить или снять лайк с танца
      tags:
      - dances
  /users/dance/compare:
    post:
      consumes:
      - application/json
      description: Загружает видео пользователя и сравнивает с указанным танцем по
        сегменту.
      parameters:
      - description: Параметры сравнения
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/models.DanceCompareRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.DanceCompareResponse'
        "400":
          description: Неверные параметры запроса
          schema:
            type: string
        "500":
          description: Внутренняя ошибка сервера
          schema:
            type: string
      summary: Сравнить танец пользователя с оригиналом
      tags:
      - dances
  /users/history:
    get:
      description: Возвращает список ранее загруженных или просмотренных танцев текущего
        пользователя
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.SearchHistoryItem'
            type: array
        "401":
          description: Пользователь не авторизован
          schema:
            type: string
        "500":
          description: Внутренняя ошибка сервера
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      summary: История поиска пользователя
      tags:
      - users
  /users/history/{history_id}:
    delete:
      description: Удаляет запись истории по её ID, принадлежащую текущему пользователю
      parameters:
      - description: UUID записи истории
        in: path
        name: history_id
        required: true
        type: string
      responses:
        "204":
          description: Запись успешно удалена
        "400":
          description: Неверный ID записи
          schema:
            type: string
        "401":
          description: Пользователь не авторизован
          schema:
            type: string
        "404":
          description: Запись не найдена
          schema:
            type: string
        "500":
          description: Внутренняя ошибка сервера
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      summary: Удалить запись из истории поиска
      tags:
      - users
    put:
      consumes:
      - application/json
      description: Изменяет пользовательское название для указанной записи истории
      parameters:
      - description: UUID записи истории
        in: path
        name: history_id
        required: true
        type: string
      - description: Новое название
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.UpdateHistoryNameInput'
      responses:
        "204":
          description: Название успешно обновлено
        "400":
          description: Неверный ID записи или тело запроса
          schema:
            type: string
        "401":
          description: Пользователь не авторизован
          schema:
            type: string
        "404":
          description: Запись не найдена
          schema:
            type: string
        "500":
          description: Внутренняя ошибка сервера
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      summary: Обновить название записи в истории
      tags:
      - users
  /users/likes:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.UserLikeDancesResponse'
        "401":
          description: Unauthorized
        "500":
          description: Internal Server Error
      summary: Get all liked dances for current user
      tags:
      - users
  /users/load:
    post:
      consumes:
      - multipart/form-data
      description: Принимает видеофайл через multipart/form-data, конвертирует в H.264
        и отправляет на анализ
      parameters:
      - description: Видеофайл (до 60 МБ)
        in: formData
        name: dance
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.LoadDanceResponse'
        "400":
          description: Ошибка чтения файла или неверный запрос
          schema:
            type: string
        "413":
          description: Файл слишком большой
          schema:
            type: string
        "500":
          description: Внутренняя ошибка сервера
          schema:
            type: string
      security:
      - OptionalAuth: []
      summary: Загрузить видео танца и обработать его
      tags:
      - dances
  /users/loadByURL:
    post:
      consumes:
      - application/json
      description: Принимает JSON с URL, скачивает видео и обрабатывает его
      parameters:
      - description: URL видео
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.LoadDanceByURLInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.LoadDanceResponse'
        "400":
          description: Неверный запрос или отсутствует URL
          schema:
            type: string
        "404":
          description: Видео не найдено
          schema:
            type: string
        "500":
          description: Внутренняя ошибка сервера
          schema:
            type: string
      security:
      - OptionalAuth: []
      summary: Загрузить танец по URL видео
      tags:
      - dances
  /users/main_page:
    get:
      description: Возвращает массив танцев (возможно, популярных или недавних)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.MainPageResponse'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            type: string
      security:
      - OptionalAuth: []
      summary: Получить список танцев для главной страницы
      tags:
      - dances
swagger: "2.0"
