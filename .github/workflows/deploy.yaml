name: DDDance deploy

on:
  push:
    branches:
      - main   

jobs:
  govulncheck:
    name: Run govulncheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'

      - name: Run govulncheck
        uses: golang/govulncheck-action@v1

  linters-act: 
    name: linters
    runs-on: ubuntu-latest
    needs: govulncheck
    steps:
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
      - uses: actions/checkout@v3 
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          args: --disable-all -E staticcheck --skip-files=".*" --exclude="SA1019"
          
  tests-act:
    name: tests 
    needs: linters-act 
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
      - name: Build
        run: go build -v ./...
      - name: Test
        run: go test -v ./...

  deploy:
    name: Deploy DDDance
    needs: tests-act 
    timeout-minutes: 30
    runs-on: ubuntu-latest

    steps:
      - name: Pull code
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: root
          key: ${{ secrets.PRIVATE_KEY }}
          script: cd ~/backend/2026_1_DavaiDavaiDeploy_Backend && git stash && git pull

      - name: Build containers
        uses: appleboy/ssh-action@master
        with:
          timeout: 30m
          command_timeout: 30m
          host: ${{ secrets.HOST }}
          username: root
          key: ${{ secrets.PRIVATE_KEY }}
          script: cd ~/backend/2026_1_DavaiDavaiDeploy_Backend

      - name: Restart service
        uses: appleboy/ssh-action@master
        with:
          timeout: 30m
          command_timeout: 30m
          host: ${{ secrets.HOST }}
          username: root
          key: ${{ secrets.PRIVATE_KEY }}
          script: cd ~/backend/2026_1_DavaiDavaiDeploy_Backend && sudo docker compose down -v && sudo docker compose up -d --build
