syntax = "proto3";
package auth; 
option go_package = "./internal/pkg/auth/delivery/grpc/gen/;gen";

service Auth {
  rpc SignupUser(SignupRequest) returns (AuthResponse) {}
  rpc SignInUser(SignInRequest) returns (AuthResponse) {}
  rpc LogOutUser(LogOutUserRequest) returns (LogOutUserResponse) {}
  rpc GetUser(GetUserRequest) returns (UserResponse) {}
  rpc ChangePassword(ChangePasswordRequest) returns (AuthResponse) {}
  rpc LoadDance(LoadDanceRequest) returns (LoadDanceResponse) {}
  rpc LoadDanceByURL(LoadDanceByURLRequest) returns (LoadDanceResponse) {}
  rpc GetDanceByID(GetDanceByIDRequest) returns (LoadDanceResponse) {}
  rpc GetMainPage(GetMainPageRequest) returns (GetMainPageResponse) {}
  rpc GetSegmentDescription(GetSegmentDescriptionRequest) returns (GetSegmentDescriptionResponse) {}
  rpc CompareDance(CompareDanceRequest) returns (CompareDanceResponse) {}

  rpc ValidateAndGetUser(ValidateAndGetUserRequest) returns (UserResponse) {}

  rpc Enable2fa(Enable2faRequest) returns (Enable2faResponse) {}
  rpc Disable2fa(Disable2faRequest) returns (Disable2faResponse) {}
  rpc SignUpUserVK(SignupVKRequest) returns (AuthResponse) {}
  rpc SignInUserVK(SignupVKRequest) returns (AuthResponse) {}
}

message SignupVKRequest {
  optional string Login = 1;
  string VkID = 2;
}

message Enable2faRequest {
  string ID = 1;
  bool Has2fa = 2;
}

message Enable2faResponse {
  bool Has2fa = 1;
  bytes QrCode = 2;
}

message Disable2faRequest {
  string ID = 1;
  bool Has2fa = 2;
}

message Disable2faResponse {
  bool Has2fa = 1;
}

message EmptyResponse {}

message UserResponse {
  string ID = 1;       
  int32 Version = 2;  
  string Login = 3;
  string Avatar = 4;
  bool Has2fa = 5;
  bool IsForeign = 6;
}

message SignupRequest {
  string Login = 1;
  string Password = 2;
}

message SignInRequest {  
  string Login = 1;
  string Password = 2;
  optional string TwoFactorCode = 3;
}

message AuthResponse {  
  UserResponse User = 1;
  string JWTToken = 2;
  string CSRFToken = 3;
}


message GetUserRequest {
  string ID = 1;
}

message ChangePasswordRequest {
  string OldPassword = 1;
  string NewPassword = 2;
  string UserID = 3;
}

message LoadDanceRequest {
  bytes Dance = 1; 
  string FileFormat = 2;
}

message LoadDanceByURLRequest {
  string Url = 1;
}

message LoadDanceResponse {
  string DanceID = 1;
  string SegmentsKey = 2;
  string FullGlbKey= 3;
  repeated string GlbKeys = 4;
  int32 NumFrames = 5;
  int32 NumSegments = 6;
  int32 NumSegmentsRendered = 7;
  double DurationSec = 8;
  string VideoPath = 9;
}

message LogOutUserRequest{
  string ID = 1;       
  int32 Version = 2;  
  string Login = 3;
  string Avatar = 4;
}

message LogOutUserResponse{}

message ValidateAndGetUserRequest{
  string Token = 1;
}

message GetDanceByIDRequest {
  string DanceId = 1;
}

message GetMainPageRequest {}

message VideoItem {
  string ID = 1;
  string URL = 2;
}

message GetMainPageResponse {
  int32 Count = 1;
  repeated VideoItem Videos = 2;
}

message GetSegmentDescriptionRequest {
    string DanceId = 1;
    int32 SegmentIdx = 2;
}

message GetSegmentDescriptionResponse {
    string DanceId = 1;
    int32 SegmentIdx = 2;
    string Description = 3;
}

message CompareDanceRequest {
    bytes Dance = 1;
    string FileFormat = 2;
    string ReferenceDanceID = 3;
    string UserID = 4;
}

message CompareDanceResponse {
    string UserGlbKey = 1;
    string ReferenceGlbKey = 2;
    double Score = 3;
    double DtwDistance = 4;
    string UserDanceID = 5;
    string DanceID = 6;
}