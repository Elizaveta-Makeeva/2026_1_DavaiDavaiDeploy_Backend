services:
  postgres:
    build:
      context: .
      dockerfile: ./build/pg.Dockerfile
    container_name: postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: DDDance
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./build/sql/:/docker-entrypoint-initdb.d/
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d DDDance"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ddd-network

  main:
    build:
      context: .
      dockerfile: ./build/main.Dockerfile
    container_name: main
    restart: unless-stopped
    env_file:
      - .env
    environment:
      AUTH_SERVICE_HOST: auth
      AUTH_SERVICE_PORT: 5459
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ddd-network

  auth:
    build:
      context: .
      dockerfile: ./build/auth.Dockerfile
    container_name: auth
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ddd-network

volumes:
  postgres_data:

networks:
  ddd-network:
    name: ddd-network