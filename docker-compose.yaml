services:
  postgres:
    build:
      context: .
      dockerfile: ./build/pg.Dockerfile
    env_file:
      - .env
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      ML_SERVICE_URL: ${ML_SERVICE_URL:-}
    expose:
      - "5432"
    volumes:
      - ./build/sql/:/docker-entrypoint-initdb.d/
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-DDDance}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ddd-network

  main:
    build:
      context: .
      dockerfile: ./build/main.Dockerfile
    ports:
      - 5458:5458
    container_name: main
    restart: unless-stopped
  
    environment:
      DB_HOST: ${DB_HOST:-postgres}
      DB_NAME: ${DB_NAME:-DDDance}
      DB_PORT: ${DB_PORT:-5432}
      AUTH_SERVICE_HOST: ${AUTH_SERVICE_HOST:-auth}
      ML_SERVICE_URL: ${ML_SERVICE_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
      auth:
        condition: service_started
    networks:
      - ddd-network

  auth:
    build:
      context: .
      dockerfile: ./build/auth.Dockerfile
    expose:
      - "5459"
    restart: unless-stopped
  
    environment:
      DB_HOST: ${DB_HOST:-postgres}
      DB_NAME: ${DB_NAME:-DDDance}
      DB_PORT: ${DB_PORT:-5432}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ddd-network

volumes:
  postgres_data:

networks:
  ddd-network:
    name: ddd-network