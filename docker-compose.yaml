services:
  postgres:
    build:
      context: .
      dockerfile: ./build/pg.Dockerfile
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: DDDance
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - ./build/sql/:/docker-entrypoint-initdb.d/
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-DDDance}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ddd-network

  main:
    build:
      context: .
      dockerfile: ./build/main.Dockerfile
    container_name: main
    restart: unless-stopped
    ports:
      - "${MAIN_PORT:-5458}:5458"
    env_file:
      - .env
    environment:
      DB_HOST: ${DB_HOST:-postgres}
      DB_NAME: ${DB_NAME:-DDDance}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres123}
      DB_PORT: ${DB_PORT:-5432}
      AUTH_SERVICE_HOST: ${AUTH_SERVICE_HOST:-auth}
      AUTH_SERVICE_PORT: ${AUTH_SERVICE_PORT:-5459}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ddd-network

  auth:
    build:
      context: .
      dockerfile: ./build/auth.Dockerfile
    container_name: auth
    restart: unless-stopped
    ports:
      - "${AUTH_PORT:-5459}:5459"
    env_file:
      - .env
    environment:
      DB_HOST: ${DB_HOST:-postgres}
      DB_NAME: ${DB_NAME:-DDDance}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres123}
      DB_PORT: ${DB_PORT:-5432}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ddd-network

volumes:
  postgres_data:

networks:
  ddd-network:
    name: ddd-network